<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your DormDrop sign-in code</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#FAF8F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FAF8F5;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;background-color:#FFFFFF;border:1px solid #E2DCD4;">

          <!-- Header -->
          <tr>
            <td style="padding:32px 32px 0 32px;">
              <p style="margin:0;font-size:20px;font-weight:600;color:#2C2520;letter-spacing:-0.02em;">
                DormDrop
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:24px 32px;">
              <p style="margin:0 0 8px 0;font-size:15px;font-weight:500;color:#2C2520;">
                Your sign-in code
              </p>
              <p style="margin:0 0 24px 0;font-size:14px;line-height:1.6;color:#8C7E72;">
                Enter this code in the app to continue signing in to your DormDrop account.
              </p>

              <!-- OTP Code -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding:16px 0;">
                    <div style="display:inline-block;padding:16px 32px;background-color:#FAF8F5;border:1px solid #E2DCD4;font-size:32px;font-weight:600;letter-spacing:0.3em;color:#2C2520;font-family:'Courier New',Courier,monospace;">
                      {{ .Token }}
                    </div>
                  </td>
                </tr>
              </table>

              <p style="margin:24px 0 0 0;font-size:13px;line-height:1.5;color:#8C7E72;">
                This code expires in 24 hours. If you didn&rsquo;t request this, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 32px;">
              <div style="border-top:1px solid #EDE8E2;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px 28px 32px;">
              <p style="margin:0;font-size:12px;color:#B5A99B;line-height:1.5;">
                This is an automated message from DormDrop. Please do not reply.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
