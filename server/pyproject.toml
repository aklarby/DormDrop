[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "supabase/migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '/(\.venv|supabase/migrations)/'

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
addopts = "-ra"
asyncio_mode = "auto"
