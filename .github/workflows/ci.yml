name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  server:
    name: server — lint + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black pytest pytest-asyncio respx
      - name: ruff
        run: ruff check .
      - name: black --check
        run: black --check .
      - name: pytest
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SECRET_KEY: ci-test-secret
          OPENAI_API_KEY: ci-test-openai
        run: pytest -q

  client:
    name: client — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLIC_KEY: ci-anon-key
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
